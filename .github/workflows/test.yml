name: "Integration Tests"

permissions:
  id-token: write # This is required for requesting the JWT for workload identity

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Matrix test for all supported platforms and architectures

  integration-tests:
    # Skip our integration tests if the PR is from a fork. This has the consequence of
    # disabling these even if the PR is from a forked repo into itself, but given that
    # these tests are very specific to our internal test environment that is a good thing.
    #
    # Similarly, skip if this is running from a PR that has been opened by dependabot as
    # the bot does not have credentials for the integration testing tailnet.
    # TODO(mpminardi): revisit / remove this if / when we give dependabot a tailnet for
    # testing with a smaller blast radius.
    if: ${{ github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
    name: ${{ matrix.os }} (${{ matrix.arch }}) (${{ matrix.credential-type }}) tailscale-${{ matrix.version || 'default' }} ${{ matrix.install-type && format('({0})', matrix.install-type) || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux tests (AMD64)
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # Try unstable too
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: unstable
            credential-type: oauth

          # Try a pinned version
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            credential-type: oauth
            # leave version blank to fall back to default

          # Linux tests (ARM64)
          - os: ubuntu-24.04-arm
            runner-os: Linux
            arch: arm64
            version: latest
            credential-type: oauth

          # Windows tests (AMD64)
          - os: windows-latest
            runner-os: Windows
            arch: amd64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # Windows tests (ARM64)
          - os: windows-11-arm
            runner-os: Windows
            arch: arm64
            version: latest
            credential-type: oauth

          # macOS 14 (ARM)
          - os: macos-14
            runner-os: macOS
            arch: arm64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth
            install-type: source

          # macOS latest (ARM), explicitly exercising the Homebrew install path.
          - os: macos-latest
            runner-os: macOS
            arch: arm64
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth
            install-type: brew

          # Try workload identity for each platform
          - os: macos-latest
            runner-os: macOS
            arch: amd64
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: workload-identity
            install-type: brew

          - os: windows-latest
            runner-os: Windows
            arch: amd64
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: workload-identity
            # leave version blank to fall back to default

          # Try adding in an unstable
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: unstable
            credential-type: workload-identity

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Action
        run: npm run build

      - name: Resolve Homebrew Tailscale Version
        id: brew-version
        if: matrix.install-type == 'brew'
        shell: bash
        run: |
          version="$(brew info --json=v2 --formula tailscale | node -e 'let input = ""; process.stdin.on("data", d => input += d); process.stdin.on("end", () => console.log(JSON.parse(input).formulae[0].versions.stable));')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Force Source Install Path
        if: matrix.install-type == 'source'
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/no-brew"
          printf '#!/usr/bin/env bash\nexit 127\n' > "${RUNNER_TEMP}/no-brew/brew"
          chmod +x "${RUNNER_TEMP}/no-brew/brew"
          echo "${RUNNER_TEMP}/no-brew" >> "${GITHUB_PATH}"

      # Test with OAuth authentication
      - name: Test Action
        id: tailscale-oauth
        uses: ./
        with:
          oauth-client-id: ${{ matrix.credential-type == 'oauth' && secrets.TS_AUTH_KEYS_OAUTH_CLIENT_ID || secrets.TS_WORKLOAD_IDENTITY_CLIENT_ID }}
          oauth-secret: ${{ matrix.credential-type == 'oauth' &&  secrets.TS_AUTH_KEYS_OAUTH_CLIENT_SECRET || '' }}
          audience: ${{ matrix.credential-type == 'workload-identity' && secrets.TS_AUDIENCE || ''}}
          tags: "tag:ci"
          version: "${{ matrix.install-type == 'brew' && steps.brew-version.outputs.version || matrix.version }}"
          use-cache: false
          timeout: "5m"
          retry: 3
          ping: "${{ matrix.ping }}"

      - name: Verify Explicit Install Type
        if: matrix.install-type
        shell: bash
        run: |
          if [ "${{ matrix.install-type }}" = "brew" ]; then
            brew list --formula tailscale
            sudo brew services list | grep -E '^tailscale[[:space:]]+started'
          elif [ "${{ matrix.install-type }}" = "source" ]; then
            if brew --version >/dev/null 2>&1; then
              echo "brew should have been unavailable for source install test"
              exit 1
            fi
            test -x /usr/local/bin/tailscale
            test -x /usr/local/bin/tailscaled
          fi

      # Look up names to make sure MagicDNS is working
      - name: Look up qualified name
        run: nslookup lax-pve.pineapplefish.ts.net

      - name: Look up unqualified name
        run: nslookup lax-pve

      # Test Tailscale status command
      - name: Check Tailscale Status
        if: steps.tailscale-oauth.outcome == 'success'
        run: |
          echo "Testing Tailscale status command..."
          if [ "${{ matrix.runner-os }}" == "Windows" ]; then
            # Windows uses system-installed binary without sudo
            tailscale status
            tailscale version
          else
            # Linux and macOS use system-installed binary with sudo
            sudo -E tailscale status  
            tailscale version
          fi
        shell: bash
