name: "Integration Tests"

permissions:
  id-token: write # This is required for requesting the JWT for workload identity

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Matrix test for all supported platforms and architectures

  integration-tests:
    # Skip our integration tests if the PR is from a fork. This has the consequence of
    # disabling these even if the PR is from a forked repo into itself, but given that
    # these tests are very specific to our internal test environment that is a good thing.
    #
    # Similarly, skip if this is running from a PR that has been opened by dependabot as
    # the bot does not have credentials for the integration testing tailnet.
    # TODO(mpminardi): revisit / remove this if / when we give dependabot a tailnet for
    # testing with a smaller blast radius.
    if: ${{ github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
    name: ${{ matrix.os }} (${{ matrix.arch }}) (${{ matrix.credential-type }}) tailscale-${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux tests (AMD64)
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # Try unstable too
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: unstable
            credential-type: oauth

          # Try a pinned version
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            credential-type: oauth
            # leave version blank to fall back to default

          # Linux tests (ARM64)
          - os: ubuntu-24.04-arm
            runner-os: Linux
            arch: arm64
            version: latest
            credential-type: oauth

          # Windows tests (AMD64)
          - os: windows-latest
            runner-os: Windows
            arch: amd64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # Windows tests (ARM64)
          - os: windows-11-arm
            runner-os: Windows
            arch: arm64
            version: latest
            credential-type: oauth

          # macOS 14 (ARM)
          - os: macos-14
            runner-os: macOS
            arch: arm64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # macOS latest (ARM)
          - os: macos-latest
            runner-os: macOS
            arch: arm64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: oauth

          # Try workload identity for each platform
          - os: macos-latest
            runner-os: macOS
            arch: amd64
            version: latest
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: workload-identity

          - os: windows-latest
            runner-os: Windows
            arch: amd64
            ping: 100.99.0.2,lax-pve.pineapplefish.ts.net,lax-pve
            credential-type: workload-identity
            # leave version blank to fall back to default

          # Try adding in an unstable
          - os: ubuntu-latest
            runner-os: Linux
            arch: amd64
            version: unstable
            credential-type: workload-identity

          # ubuntu-slim smoke test  
          - os: ubuntu-slim
            runner-os: Linux
            arch: amd64
            version: latest
            credential-type: oauth


    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Action
        run: npm run build

      # Test with OAuth authentication
      - name: Test Action
        id: tailscale-oauth
        uses: ./
        continue-on-error: true
        with:
          oauth-client-id: ${{ matrix.credential-type == 'oauth' && secrets.TS_AUTH_KEYS_OAUTH_CLIENT_ID || secrets.TS_WORKLOAD_IDENTITY_CLIENT_ID }}
          oauth-secret: ${{ matrix.credential-type == 'oauth' &&  secrets.TS_AUTH_KEYS_OAUTH_CLIENT_SECRET || '' }}
          audience: ${{ matrix.credential-type == 'workload-identity' && secrets.TS_AUDIENCE || ''}}
          tags: "tag:ci"
          version: "${{ matrix.version }}"
          use-cache: false
          timeout: "5m"
          retry: 3
          ping: "${{ matrix.ping }}"

      # Debug steps for ubuntu-slim
      - name: Debug - Check tailscaled process
        if: matrix.os == 'ubuntu-slim'
        run: |
          echo "=== Checking for tailscaled process ==="
          ps aux | grep tailscale || echo "No tailscaled process found"
          echo ""
          echo "=== Checking if tailscaled binary exists and permissions ==="
          ls -la /usr/local/bin/tailscaled || echo "tailscaled binary not found in /usr/local/bin"
          ls -la /usr/bin/tailscaled || echo "tailscaled binary not found in /usr/bin"
          ls -la /usr/sbin/tailscaled || echo "tailscaled binary not found in /usr/sbin"
          echo ""
          echo "=== Checking tailscaled socket ==="
          ls -la /var/run/tailscale/tailscaled.sock || echo "Socket not found"
          echo ""
          echo "=== Attempting to run tailscaled manually to see errors ==="
          sudo /usr/local/bin/tailscaled --version || echo "Failed to get version"
          echo ""
          echo "=== Checking for required dependencies ==="
          ldd /usr/local/bin/tailscaled || echo "Failed to check dependencies"
        shell: bash

      - name: Debug - Check system logs
        if: matrix.os == 'ubuntu-slim'
        run: |
          echo "=== Checking dmesg for tailscale-related errors ==="
          dmesg | grep -i tailscale || echo "No tailscale entries in dmesg"
          echo ""
          echo "=== Checking if journalctl is available ==="
          which journalctl && journalctl -xe --no-pager -n 100 | grep -i tailscale || echo "journalctl not available or no tailscale entries"
        shell: bash

      - name: Debug - Try manual start
        if: matrix.os == 'ubuntu-slim'
        run: |
          echo "=== Attempting to start tailscaled manually ==="
          sudo /usr/local/bin/tailscaled --state=/var/lib/tailscale/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock &
          TAILSCALED_PID=$!
          echo "Started tailscaled with PID: $TAILSCALED_PID"
          sleep 2
          echo ""
          echo "=== Checking if process is still running ==="
          ps -p $TAILSCALED_PID || echo "Process $TAILSCALED_PID is not running"
          echo ""
          echo "=== Checking socket ==="
          ls -la /var/run/tailscale/tailscaled.sock || echo "Socket still not created"
          echo ""
          echo "=== Trying to get status ==="
          sudo /usr/local/bin/tailscale status || echo "Failed to get status"
        shell: bash

      - name: Debug - Check system info
        if: matrix.os == 'ubuntu-slim'
        run: |
          echo "=== System information ==="
          uname -a
          echo ""
          echo "=== Ubuntu version ==="
          cat /etc/os-release
          echo ""
          echo "=== Available shared libraries ==="
          ldconfig -p | grep -E "libc|libpthread|libdl|libm" || echo "Failed to check libraries"
          echo ""
          echo "=== File system capabilities ==="
          df -h
          echo ""
          echo "=== Check /tmp and /var permissions ==="
          ls -la /var/run/ | head -20
          ls -la /var/lib/ | head -20
        shell: bash

      

      # Look up names to make sure MagicDNS is working
      - name: Look up qualified name
        run: nslookup lax-pve.pineapplefish.ts.net

      - name: Look up unqualified name
        run: nslookup lax-pve

      # Test Tailscale status command
      - name: Check Tailscale Status
        if: steps.tailscale-oauth.outcome == 'success'
        run: |
          echo "Testing Tailscale status command..."
          if [ "${{ matrix.runner-os }}" == "Windows" ]; then
            # Windows uses system-installed binary without sudo
            tailscale status
            tailscale version
          else
            # Linux and macOS use system-installed binary with sudo
            sudo -E tailscale status  
            tailscale version
          fi
        shell: bash
