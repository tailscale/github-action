name: "Lint Checks"

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Basic linter check
  lint-check:
    name: Lint check

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run formatter check
        run: |
          ./node_modules/.bin/prettier --check --loglevel silent "src/**/*.ts" || ( \
            echo "Run this command on your local device to fix the error:" && \
            echo "" && \
            echo "  make format" && \
            echo "" && exit 1)

      - name: Run build check
        run: |
          npm run build && test -z "$(git status --porcelain)" || ( \
            echo "dist is out of date, run this command on your local device to fix the error:" && \
            echo "" && \
            echo "  make build" && \
            echo "" && exit 1)
