name: "Lint Checks"

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # Basic linter check
  lint-check:
    name: Lint check

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run formatter check
        run: |
          ./node_modules/.bin/prettier --check --loglevel silent "src/**/*.ts" || ( \
            echo "Run this command on your local device to fix the error:" && \
            echo "" && \
            echo "  make format" && \
            echo "" && exit 1)

      - name: Run build check
        run: |
          npm run build && test -z "$(git status --porcelain)" || ( \
            echo "dist is out of date, run this command on your local device to fix the error:" && \
            echo "" && \
            echo "  make build" && \
            echo "" && exit 1)
